<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entrepreneurship Quiz</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="score-board">
    ✅ Correct: <span id="correct">0</span>
    ❌ Wrong: <span id="wrong">0</span>
  </div>

  <div class="container">

    <h1 class="title">ENTREPRENEURSHIP QUIZ</h1>

    <p class="subtitle">
      Interactive Learning Presentation
    </p>

    <div class="quiz-container">

      <h2 id="question"></h2>

      <div class="choices">
        <button class="option"></button>
        <button class="option"></button>
        <button class="option"></button>
        <button class="option"></button>
      </div>

      <button id="nextBtn">
        Next Question
      </button>

    </div>

    <div id="feedback"></div>

  </div>

  <div class="popup" id="popup">

    <div class="popup-content">

      <h2>Correct Answer!</h2>

      <p>Great Job Student 🎉</p>

      <button onclick="closePopup()">
        Continue
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
