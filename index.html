<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Techpreneurship Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

    <h1>Techpreneurship Quiz</h1>

    <div class="score-board">
        Correct: <span id="correct">0</span> |
        Wrong: <span id="wrong">0</span>
    </div>

    <div class="question-box">
        <h2 id="question">Loading...</h2>
    </div>

    <div id="feedback"></div>

    <div class="choices">
        <button class="choice" onclick="checkAnswer(this)"></button>
        <button class="choice" onclick="checkAnswer(this)"></button>
        <button class="choice" onclick="checkAnswer(this)"></button>
        <button class="choice" onclick="checkAnswer(this)"></button>
    </div>

    <div class="controls">
        <button id="resetBtn" onclick="resetGame()">Reset</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
